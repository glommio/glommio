name: Cache setup

description: Setups up the cache for Rust-based steps

inputs: {}
outputs: {}

runs:
  using: composite
  steps:
    - name: Version information
      id: versions
      shell: bash
      run: |
        set -euo pipefail

        rustc --version
        cargo --version
        rustup --version

        rustc_hash="$(
          rustc --version --verbose |
            sha256sum |
            cut -d ' ' -f 1
        )"

        echo "rustc-hash=$rustc_hash" >> "$GITHUB_OUTPUT"

    - name: Calculate dependencies
      shell: bash
      run: cargo generate-lockfile

    - name: Restore Rust cache
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/debug/.fingerprint/
          target/debug/build/
          target/debug/deps/
          target/debug/incremental/
        key: ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-cargo-${{ steps.versions.outputs.rustc-hash }}-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-cargo-${{ steps.versions.outputs.rustc-hash }}-${{ hashFiles('Cargo.lock') }}-
